<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
    xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>
    <meta charset="utf-8">
    <!-- 반응형 디자인을 위한 뷰포트 설정 -->
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- 사이트 아이콘 설정 -->
    <link rel="shortcut icon" src="./favicon.ico" type="image/x-icon" size="33x32">

    <!-- Font Awesome 아이콘 라이브러리 로드 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">

    <!-- 브라우저 탭에 표시될 페이지 제목 -->
    <title>semiprojectv1</title>

    <!-- Bootstrap CSS 파일 로드 (외부 CDN 사용) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <th:block layout:fragment="css"></th:block>
    <style> /*layout.html의 head - styles 태그에 자동 삽입 */
        /* 상단 네비바 메뉴를 가운데로 정렬 배치 */
        .space-between {
            display: flex;
            justify-content: space-around;  /* 항목들을 균등하게 배치 */
            width: 90%;                     /* 90% 너비로 설정 */
            margin: 0 auto;                 /* 중앙에 배치 */
        }
    </style>
</head>
<body>
    <!--웹 페이지 레이아웃(가운데 정렬)을 위한 태그들-->
    <div class="container">
        <div class="content-wrapper mx-auto"> <!--mx-auto :  해당 요소를 수평 중앙에 배치 -->
            <!-- 헤더 부분을 다른 파일에서 불러오기 (Thymeleaf 템플릿) -->
            <div th:replace="~{fragments/header::header}"></div>
            <!-- 네비게이션 바 부분을 다른 파일에서 불러오기 -->
            <div th:replace="~{fragments/nav::nav}"> </div>
            <!-- 콘텐츠 영역 (여기서 실제 콘텐츠가 렌더링됨) -->
            <th:block layout:fragment="content"></th:block>
            <!-- 푸터 부분을 다른 파일에서 불러오기 -->
            <div th:replace="~{fragments/footer::footer}"></div>
        </div>

    </div>
    <!-- Bootstrap JavaScript 파일 로드 (외부 CDN 사용) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <!-- 추가적인 스크립트가 삽입될 부분 -->
    <th:block layout:fragment="script"></th:block>
</body>
</html>
